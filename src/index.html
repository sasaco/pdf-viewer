<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Viewer</title>
  <link rel="stylesheet" href="/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <!-- Toolbar -->
    <header id="toolbar">
      <div class="toolbar-group">
        <button id="btn-open" title="PDFを開く">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span>開く</span>
        </button>
      </div>

      <div class="toolbar-group nav-group">
        <button id="btn-prev" title="前のページ" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <div class="page-info">
          <input id="page-input" type="number" min="1" value="1" />
          <span>/</span>
          <span id="page-total">0</span>
        </div>
        <button id="btn-next" title="次のページ" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>

      <div class="toolbar-group zoom-group">
        <button id="btn-zoom-out" title="縮小">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
        </button>
        <span id="zoom-level">100%</span>
        <button id="btn-zoom-in" title="拡大">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
        </button>
        <button id="btn-fit-width" title="幅に合わせる">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="18" rx="2"/>
            <line x1="9" y1="3" x2="9" y2="21"/>
            <line x1="15" y1="3" x2="15" y2="21"/>
          </svg>
        </button>
      </div>

      <div class="toolbar-group search-group">
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input id="search-input" type="text" placeholder="検索..." />
        </div>
      </div>

      <div class="toolbar-group">
        <button id="btn-toc" title="目次">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
            <line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
        </button>
        <button id="btn-thumbnails" title="サムネイル">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content Area -->
    <div id="main-container">
      <!-- Sidebar (TOC + Thumbnails) -->
      <aside id="toc-panel" class="hidden">
        <div class="sidebar-header">
          <div class="sidebar-tabs">
            <button class="sidebar-tab active" data-tab="toc">目次</button>
            <button class="sidebar-tab" data-tab="thumbnails">サムネイル</button>
          </div>
          <button id="btn-toc-close" title="閉じる">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div id="toc-pane" class="sidebar-pane active">
          <div id="toc-list"></div>
        </div>
        <div id="thumbnails-pane" class="sidebar-pane">
          <div id="thumbnails-list"></div>
        </div>
      </aside>

      <!-- PDF Canvas Area -->
      <div id="viewer-container">
        <!-- Welcome Screen -->
        <div id="welcome-screen">
          <div class="welcome-icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
          </div>
          <h2>PDF Viewer</h2>
          <p>PDFファイルを開いて閲覧できます</p>
          <button id="btn-welcome-open">ファイルを開く</button>
        </div>

        <!-- PDF Rendering Area -->
        <div id="pdf-container" class="hidden">
          <div id="book-depth-wrapper">
            <canvas id="pdf-canvas"></canvas>
          </div>
          <div id="text-layer"></div>
        </div>
      </div>
    </div>

    <!-- File Name Bar -->
    <footer id="status-bar">
      <span id="file-name">ファイル未選択</span>
      <span id="status-info"></span>
    </footer>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
