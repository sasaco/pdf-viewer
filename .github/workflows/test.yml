name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  vitest:
    name: vitest (${{ matrix.os }} / Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: npm ci
      - name: Run vitest
        run: npm run test

      # coverage は ubuntu / Node 20 のみで実行（高速化のため、ゲートはここで担保）
      - name: Run coverage gate
        if: matrix.os == 'ubuntu-latest' && matrix.node == 20
        run: npm run coverage
